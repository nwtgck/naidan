events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen       5536;
        server_name  localhost;

        # Hardened Content Security Policy (CSP)
        # - default-src 'self' : Only allow resources from the same origin
        # - script-src 'self' 'unsafe-inline' 'unsafe-eval' : Allow 'self', inline scripts, and eval (needed for some LLM libraries)
        # - style-src 'self' 'unsafe-inline' : Allow 'self' and inline styles (needed for styling)
        # - img-src 'self' data: blob: : Allow 'self', data URIs, and blobs (for avatars and file previews)
        # - font-src 'self' data: : Allow 'self' and data URIs (for icons/fonts)
        # - connect-src 'self' http://localhost:* http://127.0.0.1:* : ONLY allow connections to the same origin and LOCAL APIs
        # - frame-ancestors 'none' : Prevent the site from being embedded in an iframe
        # - form-action 'none' : Disable form submissions to external sites
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:* http://127.0.0.1:*; frame-ancestors 'none'; form-action 'none';";

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
