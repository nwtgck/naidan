name: CI/CD

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        uses: ./.github/actions/retry-npm-ci

      - name: Run lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shardIndex: [1, 2, 3, 4, 5, 6, 7, 8]
        shardTotal: [8]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        id: npm_install
        uses: ./.github/actions/retry-npm-ci

      - name: Run tests
        if: ${{ !cancelled() && steps.npm_install.outcome == 'success' }}
        run: npm run test -- --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

  test_python_server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Python server tests (Isolated)
        run: |
          cd naidan-server.py
          ./run_test.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        id: npm_install
        uses: ./.github/actions/retry-npm-ci

      - name: Ensure licenses.json exists
        run: |
          mkdir -p src/assets
          echo '[{"name": "dummy-package-for-tests", "version": "0.0.0", "license": "DUMMY-LICENSE", "licenseText": "This is a placeholder for CI tests."}]' > src/assets/licenses.json

      - name: Run build
        run: npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: naidan-server/go.mod

      - name: Verify naidan-server build
        run: |
          cd naidan-server
          go run build.go

      - name: Upload full dist build artifact
        uses: actions/upload-artifact@v7
        with:
          name: full-dist-build
          path: dist/

      - name: Upload naidan-server binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: naidan-server-binary
          path: naidan-server/naidan-server

  publish_to_cloudflare:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Download full dist build artifact
        uses: actions/download-artifact@v7
        with:
          name: full-dist-build
          path: dist

      - name: Create _headers
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cat << EOF > dist/hosted/_headers
          /naidan-standalone.zip
            Content-Disposition: attachment; filename="naidan-standalone-v${VERSION}.zip"
          EOF

      - name: Publish to Cloudflare Pages
        id: cloudflare_pages_deploy
        uses: cloudflare/wrangler-action@v4
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist/hosted --project-name=naidan
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: npm

      - name: Add publish URL as commit status
        uses: actions/github-script@v8
        with:
          script: |
            const sha = context.payload.pull_request?.head.sha ?? context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              context: 'Cloudflare Pages',
              description: 'Cloudflare Pages deployment',
              state: 'success',
              sha,
              target_url: "${{ steps.cloudflare_pages_deploy.outputs.deployment-url }}",
            });

  publish_to_cloudflare_local_only:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download full dist build artifact
        uses: actions/download-artifact@v7
        with:
          name: full-dist-build
          path: dist

      - name: Create _headers for local-only
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cat << EOF > dist/hosted/_headers
          /*
            Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:* http://127.0.0.1:*; frame-ancestors 'none'; form-action 'none';

          /naidan-standalone.zip
            Content-Disposition: attachment; filename="naidan-standalone-v${VERSION}.zip"
          EOF

      - name: Publish to Cloudflare Pages (local-only)
        id: cloudflare_pages_deploy_local
        uses: cloudflare/wrangler-action@v4
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.LOCAL_ONLY_CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist/hosted --project-name=naidan-local-only
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: npm

      - name: Publish legacy compatibility deployment (only-local)
        id: cloudflare_pages_deploy_local_legacy
        uses: cloudflare/wrangler-action@v4
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.ONLY_LOCAL_CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist/hosted --project-name=naidan-only-local
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: npm

      - name: Add publish URL as commit status
        uses: actions/github-script@v8
        with:
          script: |
            const sha = context.payload.pull_request?.head.sha ?? context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              context: 'Cloudflare Pages (Local-Only)',
              description: 'Primary local-only version deployment',
              state: 'success',
              sha,
              target_url: "${{ steps.cloudflare_pages_deploy_local.outputs.deployment-url }}",
            });

  publish_to_cloudflare_curated:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Download full dist build artifact
        uses: actions/download-artifact@v7
        with:
          name: full-dist-build
          path: dist

      - name: Create _headers for curated access
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Curated access is intentionally an access-range superset of
          # local-only: keep local-only script/style/img/font/connect
          # allowances, then add only the Wikipedia/Wikimedia endpoints and
          # the sandbox broker requirements.
          # Safari may not treat script-src 'self' as sufficient for module
          # scripts loaded inside an opaque-origin sandbox iframe, so keep the
          # explicit naidan-curated origins in script-src.
          # Cloudflare Pages may redirect /privacy-fetch-broker.html to the
          # extensionless /privacy-fetch-broker URL. Under COEP: require-corp,
          # the final sandboxed subdocument response also needs CORP, so keep
          # both broker document rules. Do not fix this by adding
          # allow-same-origin to the iframe.
          # The sandboxed broker module graph needs CORP + ACAO, but only
          # under /assets/privacy-fetch-broker/*. Do not make all app assets
          # CORS-readable.
          # The broker is embedded by the same-origin app, so curated CSP must
          # not use frame-ancestors 'none'.
          # Do not add stricter directives such as object-src 'none' or
          # base-uri 'none' here unless local-only gets the same restriction
          # first.
          cat << EOF > dist/hosted/_headers
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
            Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://naidan-curated.pages.dev https://*.naidan-curated.pages.dev; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:* http://127.0.0.1:* https://*.wikipedia.org https://*.wikimedia.org; frame-src 'self'; child-src 'self'; worker-src 'self' blob:; frame-ancestors 'self'; form-action 'none'; manifest-src 'self'

          /privacy-fetch-broker.html
            Cross-Origin-Resource-Policy: cross-origin

          /privacy-fetch-broker
            Cross-Origin-Resource-Policy: cross-origin

          /assets/privacy-fetch-broker/*
            Cross-Origin-Resource-Policy: cross-origin
            Access-Control-Allow-Origin: *

          /naidan-standalone.zip
            Content-Disposition: attachment; filename="naidan-standalone-v${VERSION}.zip"
          EOF

      - name: Publish to Cloudflare Pages (Curated)
        id: cloudflare_pages_deploy_curated
        uses: cloudflare/wrangler-action@v4
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CURATED_CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist/hosted --project-name=naidan-curated
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: npm

      - name: Add publish URL as commit status
        uses: actions/github-script@v8
        with:
          script: |
            const sha = context.payload.pull_request?.head.sha ?? context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              context: 'Cloudflare Pages (Curated)',
              description: 'Curated-access deployment',
              state: 'success',
              sha,
              target_url: "${{ steps.cloudflare_pages_deploy_curated.outputs.deployment-url }}",
            });

  release_to_github:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download full dist build artifact
        uses: actions/download-artifact@v7
        with:
          name: full-dist-build
          path: dist

      - name: Get tag name
        id: get_tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Rename zips with tag for release
        run: |
          TAG=${{ steps.get_tag.outputs.TAG_NAME }}
          mv dist/naidan-standalone.zip dist/naidan-standalone-${TAG}.zip
          mv dist/naidan-hosted.zip dist/naidan-hosted-${TAG}.zip

      - name: Upload extra assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/naidan-standalone-${{ steps.get_tag.outputs.TAG_NAME }}.zip
            dist/naidan-hosted-${{ steps.get_tag.outputs.TAG_NAME }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: naidan-server/go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.7.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
